      - avaliacao_organizacao
      - avaliado_em
      - avaliado_por
      - avaliado_por_nome
      - created_at
      - estudante
      - estudante_cpf
      - estudante_nome
      - horas_realizadas
      - id
      - motivo_decisao
      - oportunidade
      - oportunidade_organizacao
      - oportunidade_titulo
      - status
      - status_display
      - updated_at
    InscricaoVoluntariadoRequest:
      type: object
