openapi: 3.0.3
info:
  title: Plataforma UNIFEI - API
  version: 1.0.0
  description: API REST da plataforma que integra forum academico organizado por disciplina
    com sistema de voluntariado universitario. Trabalho de Conclusao de Curso - Ciencia
    da Computacao - UNIFEI.
paths:
  /api/auditoria/:
    get:
      operationId: auditoria_list
      description: |-
        Listagem de registros de auditoria (somente leitura).

        Regras de acesso:
        - Admin/superuser: ve todos os registros
        - Usuario comum: ve apenas registros que envolvem ele
          (acoes que ele executou OU sobre objetos que ele e dono/autor)

        Filtros disponiveis via query params:
        - ?acao=login -- filtra por tipo de acao
        - ?usuario={id} -- filtra por usuario (so admin)
        - ?data_inicio=2026-05-01 -- filtra por data
        - ?data_fim=2026-05-31
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - auditoria
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/auditoria/{id}/:
    get:
      operationId: auditoria_retrieve
      description: |-
        Listagem de registros de auditoria (somente leitura).

        Regras de acesso:
        - Admin/superuser: ve todos os registros
        - Usuario comum: ve apenas registros que envolvem ele
          (acoes que ele executou OU sobre objetos que ele e dono/autor)

        Filtros disponiveis via query params:
        - ?acao=login -- filtra por tipo de acao
        - ?usuario={id} -- filtra por usuario (so admin)
        - ?data_inicio=2026-05-01 -- filtra por data
        - ?data_fim=2026-05-31
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - auditoria
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/auth/ativar/:
    post:
      operationId: auth_ativar_create
      description: |-
        POST /api/auth/ativar/

        Valida o codigo OTP e ativa a conta do usuario. Em caso de sucesso,
        retorna os tokens JWT (access e refresh) prontos para uso.
      summary: Ativar conta de usuario
      tags:
      - Autenticacao
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AtivacaoRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AtivacaoRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AtivacaoRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/reenviar-codigo/:
    post:
      operationId: auth_reenviar_codigo_create
      description: |-
        POST /api/auth/reenviar-codigo/

        Gera um novo codigo de ativacao para usuario ainda inativo.
        Para evitar enumeration attacks (descobrir quais emails estao cadastrados),
        sempre retorna sucesso, mesmo se o email nao existir.
      summary: Reenviar codigo de ativacao
      tags:
      - Autenticacao
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReenvioCodigoRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReenvioCodigoRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReenvioCodigoRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        POST /api/auth/register/

        Cria um novo usuario com status inativo e dispara o email de ativacao.
        Nao retorna tokens; usuario precisa ativar a conta antes de logar.
      summary: Registrar novo usuario
      tags:
      - Autenticacao
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistroRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistroRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/verify/:
    post:
      operationId: auth_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
