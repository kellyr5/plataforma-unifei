          nullable: true
          description: Horas efetivamente cumpridas, registradas na conclusao
        avaliacao_organizacao:
          type: string
          readOnly: true
          description: Comentario da ONG sobre o desempenho do voluntario
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
