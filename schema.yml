        oportunidade_titulo:
          type: string
          readOnly: true
        oportunidade_organizacao:
          type: string
          readOnly: true
        estudante:
          type: string
          format: uuid
          readOnly: true
        estudante_nome:
          type: string
          readOnly: true
        estudante_cpf:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/InscricaoVoluntariadoStatusEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        motivacao:
          type: string
          description: Texto livre escrito pelo estudante no momento da inscricao
        avaliado_por:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        avaliado_por_nome:
          type: string
          readOnly: true
        avaliado_em:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        motivo_decisao:
          type: string
