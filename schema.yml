components:
  schemas:
    AcaoEnum:
      enum:
      - login
      - logout
      - registro
      - ativacao
      - disciplina_criada
      - permissao_disciplina_alterada
      - post_criado
      - post_editado
      - post_removido
      - marcou_melhor
      - desmarcou_melhor
      - denunciou
      - oportunidade_criada
      - inscricao_voluntariado
      - inscricao_aprovada
      - inscricao_rejeitada
      - inscricao_removida
      - voluntariado_concluido
      - ranking_semestral_gerado
      - denuncia_resolvida
      type: string
      description: |-
        * `login` - Login
        * `logout` - Logout
        * `registro` - Registro de novo usuario
        * `ativacao` - Ativacao de conta
        * `disciplina_criada` - Disciplina criada
        * `permissao_disciplina_alterada` - Permissao em disciplina alterada
        * `post_criado` - Post criado
        * `post_editado` - Post editado
        * `post_removido` - Post removido
        * `marcou_melhor` - Marcou resposta como melhor
        * `desmarcou_melhor` - Desmarcou melhor resposta
        * `denunciou` - Denunciou conteudo
        * `oportunidade_criada` - Oportunidade de voluntariado criada
        * `inscricao_voluntariado` - Inscricao em oportunidade de voluntariado
        * `inscricao_aprovada` - Inscricao em voluntariado aprovada
        * `inscricao_rejeitada` - Inscricao em voluntariado rejeitada
        * `inscricao_removida` - Participante removido de oportunidade
        * `voluntariado_concluido` - Voluntariado concluido e certificado emitido
        * `ranking_semestral_gerado` - Ranking semestral gerado
        * `denuncia_resolvida` - Denuncia resolvida
    AlertaConteudo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        denunciante:
          type: string
          format: uuid
          readOnly: true
        denunciante_nome:
          type: string
          readOnly: true
        post:
          type: string
          format: uuid
        post_titulo:
          type: string
          readOnly: true
        motivo:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/AlertaConteudoStatusEnum'
          readOnly: true
        resolvido_por:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        resolvido_por_nome:
          type: string
          readOnly: true
        resolucao:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        resolvido_em:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - denunciante
      - denunciante_nome
      - id
      - motivo
      - post
      - post_titulo
      - resolucao
      - resolvido_em
      - resolvido_por
      - resolvido_por_nome
      - status
    AlertaConteudoRequest:
      type: object
      properties:
        post:
          type: string
          format: uuid
        motivo:
          type: string
          minLength: 1
      required:
      - motivo
      - post
    AlertaConteudoStatusEnum:
      enum:
      - pendente
      - em_analise
      - procedente
      - improcedente
      type: string
      description: |-
        * `pendente` - Pendente
        * `em_analise` - Em Analise
        * `procedente` - Procedente
        * `improcedente` - Improcedente
    AreaEnum:
      enum:
      - educacao
      - saude
      - meio_ambiente
      - assistencia_social
      - direitos_humanos
      - cultura
      - tecnologia
      - esporte
      - outro
      type: string
      description: |-
        * `educacao` - Educacao
        * `saude` - Saude
        * `meio_ambiente` - Meio Ambiente
        * `assistencia_social` - Assistencia Social
        * `direitos_humanos` - Direitos Humanos
        * `cultura` - Cultura e Arte
        * `tecnologia` - Tecnologia
        * `esporte` - Esporte
        * `outro` - Outro
    Arquivo:
      type: object
      description: |-
        Serializa anexos de posts.

        Aplica validacao em tres camadas (extensao, magic bytes, tamanho)
        e sanitiza o nome antes de salvar.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        post:
          type: string
          format: uuid
        arquivo:
          type: string
          format: uri
        arquivo_url:
          type: string
          readOnly: true
        nome_original:
          type: string
          readOnly: true
        tamanho_bytes:
          type: integer
          readOnly: true
        tamanho_legivel:
          type: string
          readOnly: true
        tipo_mime:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - arquivo
      - arquivo_url
      - created_at
      - id
      - nome_original
      - post
      - tamanho_bytes
      - tamanho_legivel
      - tipo_mime
    AtivacaoRequest:
      type: object
      description: Serializer para ativacao de conta via codigo OTP.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        codigo:
          type: string
          minLength: 6
          maxLength: 6
      required:
      - codigo
      - email
    AuditLog:
      type: object
      description: Serializa registros de auditoria (somente leitura).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        usuario:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Usuario que executou a acao (nulo se anonimo ou usuario removido)
        usuario_cpf:
          type: string
          readOnly: true
        usuario_nome:
          type: string
          readOnly: true
        acao:
          allOf:
          - $ref: '#/components/schemas/AcaoEnum'
          readOnly: true
        acao_display:
          type: string
          readOnly: true
        objeto_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        objeto_tipo:
          type: string
          readOnly: true
        dados_anteriores:
          readOnly: true
          nullable: true
        dados_novos:
          readOnly: true
          nullable: true
        ip_origem:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        descricao:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - acao
      - acao_display
      - created_at
      - dados_anteriores
      - dados_novos
      - descricao
      - id
      - ip_origem
      - objeto_id
      - objeto_tipo
      - user_agent
      - usuario
      - usuario_cpf
      - usuario_nome
    Certificado:
      type: object
      description: Serializa certificados (somente leitura).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        codigo_validacao:
          type: string
          readOnly: true
        nome_estudante:
          type: string
          readOnly: true
        cpf_estudante:
          type: string
          readOnly: true
        nome_oportunidade:
          type: string
          readOnly: true
        nome_organizacao:
          type: string
          readOnly: true
        area_atuacao:
          type: string
          readOnly: true
        local:
          type: string
          readOnly: true
        data_inicio:
          type: string
          format: date
          readOnly: true
        data_fim:
          type: string
          format: date
          readOnly: true
        horas_realizadas:
          type: integer
          readOnly: true
        arquivo_pdf_url:
          type: string
          readOnly: true
        emitido_em:
          type: string
          format: date-time
          readOnly: true
      required:
      - area_atuacao
      - arquivo_pdf_url
      - codigo_validacao
      - cpf_estudante
      - data_fim
      - data_inicio
      - emitido_em
      - horas_realizadas
      - id
      - local
      - nome_estudante
      - nome_oportunidade
      - nome_organizacao
    Disciplina:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        codigo:
          type: string
          maxLength: 20
        nome:
          type: string
          maxLength: 255
        curso:
          type: string
          maxLength: 100
        semestre:
          type: string
          description: 'Ex: 2026.1'
          maxLength: 10
        ativo:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - codigo
      - created_at
      - curso
      - id
      - nome
      - semestre
    DisciplinaRequest:
      type: object
      properties:
        codigo:
          type: string
          minLength: 1
          maxLength: 20
        nome:
          type: string
          minLength: 1
          maxLength: 255
        curso:
          type: string
          minLength: 1
          maxLength: 100
        semestre:
          type: string
          minLength: 1
          description: 'Ex: 2026.1'
          maxLength: 10
        ativo:
          type: boolean
      required:
      - codigo
      - curso
      - nome
      - semestre
    InscricaoVoluntariado:
      type: object
