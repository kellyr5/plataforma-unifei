      - oportunidade
    InscricaoVoluntariadoStatusEnum:
      enum:
      - pendente
      - aprovada
      - rejeitada
      - removida
      - desistente
      - concluida
      type: string
      description: |-
        * `pendente` - Pendente
        * `aprovada` - Aprovada
        * `rejeitada` - Rejeitada
        * `removida` - Removida
        * `desistente` - Desistente
        * `concluida` - Concluida
    Notificacao:
      type: object
      description: Serializa notificacoes para a API.
